type: object
properties:
  search_text:
    type: string
    maxLength: 100
  has_quitted:
    type: boolean
  identifier_type:
    type: string
    enum:
      - ISBN
      - ISMN
  limit:
    type: number
    minimum: 1
    maximum: 50
  offset:
    type: number
    minimum: 0
    maximum: 100000
required:
  - limit
  - offset
