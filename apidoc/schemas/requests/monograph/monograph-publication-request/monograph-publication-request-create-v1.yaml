# Support v1 schema until ui-public form is updated
type: object
properties:
  version:
    type: number
    minimum: 1
    maximum: 1
  officialName:
    type: string
    maximum: 100
  publisherIdentifierStr:
    type: string
    maximum: 20
  locality:
    type:
      - string
      - 'null'
    enum:
      - Helsinki
  address:
    type: string
    maximum: 50
  zip:
    type: string
    maximum: 10
  city:
    type: string
    maximum: 50
  contactPerson:
    type: string
    maximum: 100
  phone:
    type: string
    maximum: 30
  email:
    type: string
    maximum: 100
  langCode:
    $ref: '../../../enums/lang-code.yaml'
  publishedBefore:
    type: boolean
  publicationsPublic:
    type: boolean
    enum:
      - true
  publishingActivity:
    $ref: '../../../enums/monograph/publishing-activity.yaml'
  publishingActivityAmount:
    type: string
  publicationType:
    $ref: '../../../enums/monograph/expression-type.yaml'
  publicationFormat: # Note: unused but kept for compatibility
    type: string
    enum:
      - PRINT
      - ELECTRONICAL
      - PRINT_ELECTRONICAL
  firstName1:
    type: string
    maximum: 50
  lastName1:
    type: string
    maximum: 50
  role1:
    type: array
    maxItems: 4
    items:
      oneOf:
        - $ref: '../../../enums/monograph/author-roles.yaml'
  firstName2:
    type: string
    maximum: 50
  lastName2:
    type: string
    maximum: 50
  role2:
    type: array
    maxItems: 4
    items:
      oneOf:
        - $ref: '../../../enums/monograph/author-roles.yaml'
  firstName3:
    type: string
    maximum: 50
  lastName3:
    type: string
    maximum: 50
  role3:
    type: array
    maxItems: 4
    items:
      oneOf:
        - $ref: '../../../enums/monograph/author-roles.yaml'
  firstName4:
    type: string
    maximum: 50
  lastName4:
    type: string
    maximum: 50
  role4:
    type: array
    maxItems: 4
    items:
      oneOf:
        - $ref: '../../../enums/monograph/author-roles.yaml'
  title:
    type: string
    maximum: 200
  subtitle:
    type: string
    maximum: 200
  mapScale:
    type: string
    maximum: 50
  language:
    $ref: '../../../enums/item-language.yaml'
  year:
    $ref: '../../../patterns/year-string.yaml'
  month:
    $ref: '../../../patterns/month-string.yaml'
  series:
    type: string
    maximum: 200
  issn:
    $ref: '../../../patterns/issn-identifier.yaml'
  volume:
    type: string
    maximum: 20
  printingHouse:
    type: string
    maximum: 100
  printingHouseCity:
    type: string
    maximum: 50
  copies:
    type: string
    maximum: 10
  edition:
    type: string
    maximum: 2
  type:
    type: array
    items:
      $ref: '../../../enums/monograph/manifestation-type.yaml'
  typeOther:
    type: string
    maximum: 100
  fileformat:
    type: array
    items:
      $ref: '../../../enums/monograph/manifestation-type.yaml'
  fileformatOther:
    type: string
    maximum: 100
  comments:
    type: string
    maximum: 2000
required:
  - version
  - officialName
  - address
  - zip
  - city
  - contactPerson
  - phone
  - email
  - langCode
  - publicationsPublic
  - publicationType
  - publicationFormat
  - language
  - year
  - month
  - firstName1
  - lastName1
  - role1
  - title
