get:
  operationId: readmonographPublisher
  summary: Read monograph publisher information. Returned information depends on user application role.
  security: []
  tags:
    - monograph
    - monograph-publisher
    - public
  parameters:
    - $ref: '../../../parameters/path/id.yaml'
  responses:
    '200':
      description: Resource was read
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '../../../schemas/responses/monograph/monograph-publisher-admin.yaml'
              - $ref: '../../../schemas/responses/monograph/monograph-publisher-guest.yaml'
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Resource was not found
    '422':
      description: Unprocessable entity
    default:
      $ref: '../../../responses/error.yaml'

patch:
  operationId: updatemonographPublisher
  summary: Update ISBN range
  security:
    - openId:
        - admin
  tags:
    - monograph
    - isbn
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../schemas/requests/monograph/monograph-publisher/monograph-publisher-update-body.yaml'
  parameters:
    - $ref: '../../../parameters/path/id.yaml'
  responses:
    '204':
      description: Resource was updated
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Resource was not found
    '409':
      description: Conflict
    '422':
      description: Unprocessable entity
    default:
      $ref: '../../../responses/error.yaml'

delete:
  operationId: deletemonographPublisher
  summary: Delete ISBN range
  security:
    - openId:
        - admin
  tags:
    - monograph
    - isbn
  parameters:
    - $ref: '../../../parameters/path/id.yaml'
  responses:
    '204':
      description: Resource was deleted
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Resource was not found
    '409':
      description: Conflict
    default:
      $ref: '../../../responses/error.yaml'
