post:
  operationId: monographPublisherAutocomplete
  summary: Endpoint for lightweight search that may be used in autocomplete
  security:
    - openId:
        - admin
  tags:
    - monograph
    - monograph-publisher
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../schemas/requests/monograph/monograph-publisher/monograph-publisher-autocomplete-body.yaml'
  responses:
    '200':
      description: Ok
      content:
        application/json:
          schema:
            type: array
            items:
              oneOf:
                - $ref: '../../../schemas/responses/monograph/monograph-publisher-autocomplete.yaml'
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '409':
      description: Conflict
    '422':
      description: Unprocessable Entity
    default:
      $ref: '../../../responses/error.yaml'
