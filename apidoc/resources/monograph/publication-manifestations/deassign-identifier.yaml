post:
  operationId: deassignManifestationIdentifier
  summary: Deassign a manifestation identifier. Requires a set of preconditions to be met for the deassign process to complete without errors.
  security:
    - openId:
        - admin
  tags:
    - monograph
    - monograph-publication-manifestation
  parameters:
    - $ref: '../../../parameters/path/id.yaml'
  responses:
    '204':
      description: Assignation was successful
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Resource was not found
    '409':
      description: Conflict
    '422':
      description: Unprocessable entity
    default:
      $ref: '../../../responses/error.yaml'
