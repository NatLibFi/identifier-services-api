post:
  operationId: assignManifestationIdentifier
  summary: Assign an ISBN or ISMN identifier for manifestation. Requires the associated publication to have publisher assigned to it, publisher to have free identifiers appropriate for the expression type, and manifestation not being part of rejected publication request.
  security:
    - openId:
        - admin
  tags:
    - monograph
    - monograph-publication-manifestation
  parameters:
    - $ref: '../../../parameters/path/id.yaml'
  responses:
    '204':
      description: Assignation was successful
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Resource was not found
    '409':
      description: Conflict
    '422':
      description: Unprocessable entity
    default:
      $ref: '../../../responses/error.yaml'
