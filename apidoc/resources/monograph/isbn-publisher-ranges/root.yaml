post:
  operationId: createIsbnPublisherRange
  summary: Create a new ISBN publisher range
  security:
    - openId:
        - admin
  description: Creates a new ISBN publisher range with associations to ISBN range and monograph publisher.
  tags:
    - monograph
    - isbn
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../schemas/requests/monograph/isbn-publisher-range/isbn-publisher-range-create-body.yaml'
  responses:
    '201':
      description: Resource was created
      content:
        application/json:
          schema:
            $ref: '../../../schemas/responses/common/created.yaml'
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '409':
      description: Conflict
    '422':
      description: Unprocessable Entity
    default:
      $ref: '../../../responses/error.yaml'
