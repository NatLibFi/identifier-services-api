post:
  operationId: searchMonographPublisher
  summary: Create a monograph publishers
  security: []
  tags:
    - monograph
    - monograph-publisher
    - public
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../schemas/requests/monograph/monograph-publisher/monograph-publisher-search-body.yaml'
  responses:
    '200':
      description: Ok
      content:
        application/json:
          schema:
            type: array
            items:
              oneOf:
                - $ref: '../../../schemas/responses/monograph/monograph-publisher-admin.yaml'
                - $ref: '../../../schemas/responses/monograph/monograph-publisher-guest.yaml'
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '409':
      description: Conflict
    '422':
      description: Unprocessable Entity
    default:
      $ref: '../../../responses/error.yaml'
