post:
  operationId: addMonographPublicationExpression
  summary: Add new expression to an existing publication
  security:
    - openId:
        - admin
        - publisher
  description: Adds a new expression to an existing expression
  tags:
    - monograph
    - monograph-publication-expression
  requestBody:
    required: true
    content:
      application/json:
        schema:
          allOf:
            - $ref: '../../../schemas/requests/monograph/monograph-publication-expression/monograph-publication-expression-create-base.yaml'
            - type: object
              required:
                - monograph_publication_id
              properties:
                monograph_publication_id:
                  type: number
  responses:
    '201':
      description: Resource was created
      content:
        application/json:
          schema:
            $ref: '../../../schemas/responses/monograph/monograph-publication-expression.yaml'
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '409':
      description: Conflict
    '422':
      description: Unprocessable Entity
    default:
      $ref: '../../../responses/error.yaml'
