get:
  operationId: readIsbnRange
  summary: Read ISBN range information
  security:
    - openId:
        - admin
  tags:
    - monograph
    - isbn
  parameters:
    - $ref: '../../../parameters/path/id.yaml'
  responses:
    '200':
      description: Resource was read
      content:
        application/json:
          schema:
            $ref: '../../../schemas/responses/monograph/isbn-range.yaml'
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Resource was not found
    '422':
      description: Unprocessable entity
    default:
      $ref: '../../../responses/error.yaml'

patch:
  operationId: updateIsbnRange
  summary: Update ISBN range
  security:
    - openId:
        - admin
  tags:
    - monograph
    - isbn
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../schemas/requests/monograph/isbn-range/isbn-range-update-body.yaml'
  parameters:
    - $ref: '../../../parameters/path/id.yaml'
  responses:
    '200':
      description: Resource was updated
      content:
        application/json:
          schema:
            $ref: '../../../schemas/responses/monograph/isbn-range.yaml'
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Resource was not found
    '409':
      description: Conflict
    '422':
      description: Unprocessable entity
    default:
      $ref: '../../../responses/error.yaml'

delete:
  operationId: deleteIsbnRange
  summary: Delete ISBN range
  security:
    - openId:
        - admin
  tags:
    - monograph
    - isbn
  parameters:
    - $ref: '../../../parameters/path/id.yaml'
  responses:
    '204':
      description: Resource was deleted
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Resource was not found
    '409':
      description: Conflict
    default:
      $ref: '../../../responses/error.yaml'
