get:
  operationId: readMonographPublicationRequest
  summary: Read monograph publication request information.
  security:
    - openId:
        - admin
  tags:
    - monograph
    - monograph-publication-request
  parameters:
    - $ref: '../../../parameters/path/id.yaml'
  responses:
    '200':
      description: Resource was read
      content:
        application/json:
          schema:
            $ref: '../../../schemas/responses/monograph/monograph-publication-request.yaml'
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Resource was not found
    '422':
      description: Unprocessable entity
    default:
      $ref: '../../../responses/error.yaml'

patch:
  operationId: updateMonographPublicationRequest
  summary: Update Monograph publication request information. Note changing publisher or publication association cannot be done using this endpoint.
  security:
    - openId:
        - admin
  tags:
    - monograph
    - monograph-publication-request
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../schemas/requests/monograph/monograph-publication-request/monograph-publication-request-update-body.yaml'
  parameters:
    - $ref: '../../../parameters/path/id.yaml'
  responses:
    '200':
      description: Resource was updated
      content:
        application/json:
          schema:
            $ref: '../../../schemas/responses/monograph/monograph-publication-request.yaml'
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Resource was not found
    '409':
      description: Conflict
    '422':
      description: Unprocessable entity
    default:
      $ref: '../../../responses/error.yaml'
