post:
  operationId: approveMonographPublicationRequest
  summary: Approve Monograph publication request. This considers assigning identifiers for all manifests from associated publisher's publisher ranges.
  security:
    - openId:
        - admin
  tags:
    - monograph
    - monograph-publication-request
  parameters:
    - $ref: '../../../parameters/path/id.yaml'
  responses:
    '204':
      description: Approval was successful
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Resource was not found
    '409':
      description: Conflict
    '422':
      description: Unprocessable entity
    default:
      $ref: '../../../responses/error.yaml'
