post:
  operationId: searchMonographPublicationRequest
  summary: Search a monograph publication request
  security:
    - openId:
        - admin
  tags:
    - monograph
    - monograph-publication-request
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../schemas/requests/monograph/monograph-publication-request/monograph-publication-request-search-body.yaml'
  responses:
    '200':
      description: Ok
      content:
        application/json:
          schema:
            $ref: '../../../schemas/responses/monograph/monograph-publisher-request-search-response.yaml'
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '409':
      description: Conflict
    '422':
      description: Unprocessable Entity
    default:
      $ref: '../../../responses/error.yaml'
