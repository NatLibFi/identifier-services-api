get:
  operationId: readMonographPublication
  summary: Read monograph publication information.
  security:
    - openId:
        - admin
  tags:
    - monograph
    - monograph-publication
  parameters:
    - $ref: '../../../parameters/path/id.yaml'
  responses:
    '200':
      description: Resource was read
      content:
        application/json:
          schema:
            $ref: '../../../schemas/responses/monograph/monograph-publication.yaml'
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Resource was not found
    '422':
      description: Unprocessable entity
    default:
      $ref: '../../../responses/error.yaml'

patch:
  operationId: updateMonographPublication
  summary: Update monograph publication primary title.
  security:
    - openId:
        - admin
        # TODO: publisher
  tags:
    - monograph
    - monograph-publication
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../schemas/requests/monograph/monograph-publication/monograph-publication-update-body.yaml'
  parameters:
    - $ref: '../../../parameters/path/id.yaml'
  responses:
    '204':
      description: Resource was updated
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Resource was not found
    '409':
      description: Conflict
    '422':
      description: Unprocessable entity
    default:
      $ref: '../../../responses/error.yaml'
